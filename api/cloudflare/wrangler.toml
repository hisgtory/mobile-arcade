# arcade-api → Cloudflare Containers 배포 설정.
# Worker가 단일 Durable Object로 라우팅하고, DO가 axum 컨테이너로 HTTP를 forward.

name = "arcade-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 컨테이너 정의: api/Dockerfile을 그대로 사용.
# image 경로는 wrangler.toml 기준 상대경로. 빌드 컨텍스트는 Dockerfile이 위치한 디렉터리.
[[containers]]
class_name = "ArcadeApi"
image = "../Dockerfile"
instance_type = "basic"   # 1 GiB / 0.25 vCPU. 필요 시 'standard'로 격상
max_instances = 5

# Worker → Container 라우팅용 Durable Object 바인딩.
[[durable_objects.bindings]]
name = "API"
class_name = "ArcadeApi"

# 첫 배포 시 DO 마이그레이션 등록 (한 번만 필요).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ArcadeApi"]

# 비밀이 아닌 환경 변수. AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY 는
# `wrangler secret put` 으로 별도 등록 (로컬에서 한 번만 실행).
[vars]
DDB_TABLE = "juicy-fruits"
AWS_REGION = "ap-northeast-2"
RUST_LOG = "arcade_api=info,tower_http=info"

# 도메인 연결: 첫 배포 후 Cloudflare 대시보드에서 zone에 hisgtory.com을 추가하고
# 아래 주석 해제 → 다시 deploy 하면 자동 매핑.
# [[routes]]
# pattern = "api.arcade.hisgtory.com/*"
# custom_domain = true
# zone_name = "hisgtory.com"

[observability]
enabled = true   # Workers logs & analytics
