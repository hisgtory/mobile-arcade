# Railway service config for arcade-api.
# Railway 대시보드에서 서비스 생성 시 Root Directory를 `api`로 지정하세요.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# 모노레포: api/ 외 변경에는 재빌드/재배포하지 않음
watchPatterns = [
  "src/**",
  "Cargo.toml",
  "Cargo.lock",
  "Dockerfile",
  "railway.toml",
]

[deploy]
# Railway가 PORT 환경변수를 주입 → main.rs에서 이미 처리
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# 운영 트래픽 들어오기 전: 단일 replica로 시작, 필요 시 대시보드에서 스케일
numReplicas = 1
