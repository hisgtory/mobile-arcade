name: Deploy Site

on:
  push:
    branches: [main, feature/found3-standalone]
    paths:
      - 'web/site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build site (static export)
        run: pnpm --filter @arcade/site build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Cloudflare Pages 프로젝트 이름. 첫 배포 시 자동 생성됨.
          command: pages deploy web/site/out --project-name=arcade-site --branch=main
