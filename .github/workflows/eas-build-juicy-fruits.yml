name: EAS Build — Juicy Fruits

# Juicy Fruits 앱 EAS 빌드 트리거.
#
# === 사용 방법 ===
#
# 1) 릴리스 빌드 (tag push):
#    - app.json의 expo.version을 1.0.0 등으로 미리 업데이트하고 main에 머지
#    - 그 후 tag push:
#        git tag juicy-fruits-android/1.0.0 && git push origin juicy-fruits-android/1.0.0
#        git tag juicy-fruits-ios/1.0.0     && git push origin juicy-fruits-ios/1.0.0
#        git tag juicy-fruits-all/1.0.0     && git push origin juicy-fruits-all/1.0.0
#
# 2) 수동 트리거 (Actions 탭 → Run workflow):
#    - platform / profile 선택 가능 (preview용 등)
#
# === 한 번 셋업해야 할 것 ===
#
# GitHub Repo Settings → Secrets and variables → Actions:
#   - EXPO_TOKEN: https://expo.dev/accounts/hisgtory/settings/access-tokens 에서 생성
#
# === 산출물 ===
#
# Build URL이 GHA 로그에 출력. 완료 후 EAS 대시보드에서 .aab/.ipa 다운로드:
#   https://expo.dev/accounts/hisgtory/projects/juicy-fruits/builds

on:
  push:
    tags:
      - 'juicy-fruits-android/*'
      - 'juicy-fruits-ios/*'
      - 'juicy-fruits-all/*'
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: EAS profile
        type: choice
        options: [preview, production]
        default: preview

concurrency:
  # 같은 tag에 대해 여러 번 push되면 이전 실행 취소.
  # tag별로 격리해서 android/ios 동시 빌드는 막지 않음.
  group: eas-build-juicy-fruits-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS build (${{ github.event_name == 'push' && github.ref_name || format('{0}/{1}', inputs.platform, inputs.profile) }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: juicyfruits/rn

    steps:
      - uses: actions/checkout@v4

      - name: Resolve platform / profile / version from tag
        id: meta
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PLATFORM="${{ inputs.platform }}"
            PROFILE="${{ inputs.profile }}"
            VERSION=""
          else
            TAG="${GITHUB_REF#refs/tags/}"
            # juicy-fruits-android/1.0.0  →  platform=android, version=1.0.0
            PLATFORM=$(echo "$TAG" | sed -E 's|^juicy-fruits-([^/]+)/.*|\1|')
            VERSION=$(echo "$TAG" | sed -E 's|^juicy-fruits-[^/]+/(.*)|\1|')
            PROFILE="production"
          fi
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "→ platform=$PLATFORM, profile=$PROFILE, version=$VERSION"

      - name: Verify app.json version matches tag
        if: github.event_name == 'push'
        run: |
          APP_VER=$(jq -r '.expo.version' app.json)
          TAG_VER='${{ steps.meta.outputs.version }}'
          if [[ "$APP_VER" != "$TAG_VER" ]]; then
            echo "::error::app.json version ($APP_VER) != tag version ($TAG_VER). app.json을 먼저 업데이트하세요."
            exit 1
          fi
          echo "✓ version match: $APP_VER"

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build
        env:
          # tag-triggered면 GitHub Release notes에 포함될 수 있도록 메타 출력
          GH_REF: ${{ github.ref }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Building: profile=${{ steps.meta.outputs.profile }}, platform=${{ steps.meta.outputs.platform }}"
          eas build \
            --profile ${{ steps.meta.outputs.profile }} \
            --platform ${{ steps.meta.outputs.platform }} \
            --message "${{ github.ref_name }} · ${{ github.sha }}" \
            --non-interactive \
            --wait
