name: EAS Build — Juicy Fruits

# Juicy Fruits 앱 EAS 빌드 트리거.
#
# === 사용 방법 ===
#
# 1) GitHub Release 발행 (정식 흐름):
#    - app.json의 expo.version을 1.0.0 등으로 미리 업데이트하고 main에 머지
#    - GitHub UI → Releases → Draft a new release
#      Tag: juicy-fruits-android/1.0.0       → production 빌드
#           juicy-fruits-android/1.0.0-rc.1  → preview 빌드 (semver pre-release)
#           juicy-fruits-ios/...             → iOS
#           juicy-fruits-all/...             → 양 플랫폼
#    - "Publish release" 클릭 → 워크플로우 자동 실행
#
#    또는 gh CLI:
#      gh release create juicy-fruits-android/1.0.0 \
#        --title "Android 1.0.0" --notes "release notes"
#
# 2) Tag만 push (Release 없이도 빌드 가능):
#      git tag juicy-fruits-android/1.0.0 && git push origin juicy-fruits-android/1.0.0
#
# 3) 수동 트리거 (Actions 탭 → Run workflow):
#    - platform / profile 직접 선택 — Release/tag 없이 ad-hoc 빌드
#
# === 트리거 필터링 ===
#
# `push.tags` 패턴(`juicy-fruits-*/*`)으로 trigger-level 필터링.
# 다른 게임의 release tag(`crunch3-...`, `found3-...` 등)에는 본 워크플로우가
# 아예 발동하지 않아 Actions 탭이 깨끗하게 유지됨.
#
# === 한 번 셋업해야 할 것 ===
#
# GitHub Repo Settings → Secrets and variables → Actions:
#   - EXPO_TOKEN: https://expo.dev/accounts/hisgtory/settings/access-tokens 에서 생성
#
# === 산출물 ===
#
# Build URL이 GHA 로그에 출력. 완료 후 EAS 대시보드에서 .aab/.ipa 다운로드:
#   https://expo.dev/accounts/hisgtory/projects/juicy-fruits/builds

on:
  push:
    tags:
      - 'juicy-fruits-android/*'
      - 'juicy-fruits-ios/*'
      - 'juicy-fruits-all/*'
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        type: choice
        options: [android, ios, all]
        default: android
      profile:
        description: EAS profile
        type: choice
        options: [preview, production]
        default: preview

concurrency:
  group: eas-build-juicy-fruits-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: juicyfruits/rn

    steps:
      - uses: actions/checkout@v4

      - name: Resolve platform / profile / version
        id: meta
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
            echo "profile=${{ inputs.profile }}"   >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="${GITHUB_REF#refs/tags/}"
          # juicy-fruits-android/1.0.0  →  platform=android, version=1.0.0
          # juicy-fruits-android/1.0.0-rc.1  →  platform=android, version=1.0.0-rc.1
          PLATFORM=$(echo "$TAG" | sed -E 's|^juicy-fruits-([^/]+)/.*|\1|')
          VERSION=$(echo "$TAG"  | sed -E 's|^juicy-fruits-[^/]+/(.*)|\1|')

          # semver pre-release 식별: -rc.X / -beta.X / -alpha.X 등 모두 포함
          if [[ "$VERSION" == *-* ]]; then
            PROFILE="preview"
          else
            PROFILE="production"
          fi

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "→ tag=$TAG, platform=$PLATFORM, profile=$PROFILE, version=$VERSION"

      - name: Verify app.json version matches tag
        if: github.event_name == 'push'
        run: |
          APP_VER=$(jq -r '.expo.version' app.json)
          TAG_VER='${{ steps.meta.outputs.version }}'
          # rc/beta suffix 허용 (e.g. 1.0.0-rc.1 → 1.0.0과 매치)
          TAG_BASE="${TAG_VER%%-*}"
          if [[ "$APP_VER" != "$TAG_BASE" ]]; then
            echo "::error::app.json version ($APP_VER) != tag base ($TAG_BASE). app.json을 먼저 업데이트하세요."
            exit 1
          fi
          echo "✓ version match: app=$APP_VER, tag=$TAG_VER"

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build
        run: |
          set -euo pipefail
          MSG="${{ github.event_name == 'push' && github.ref_name || format('manual/{0}/{1}', steps.meta.outputs.platform, steps.meta.outputs.profile) }} · ${{ github.sha }}"
          echo "Building: profile=${{ steps.meta.outputs.profile }}, platform=${{ steps.meta.outputs.platform }}"
          eas build \
            --profile ${{ steps.meta.outputs.profile }} \
            --platform ${{ steps.meta.outputs.platform }} \
            --message "$MSG" \
            --non-interactive \
            --wait
