name: Deploy API (Cloudflare Containers — fallback)

# 메인 배포는 deploy-api-lambda.yml. 이 워크플로우는 Cloudflare 측 fallback용.
# push 트리거 비활성화 — 필요할 때만 GHA UI에서 Run workflow.
on:
  workflow_dispatch:

# 동시 실행 막기 — 같은 컨테이너 이미지 빌드/배포가 겹치지 않도록
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloudflare Containers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/cloudflare/package-lock.json

      - name: Install Cloudflare deps
        working-directory: api/cloudflare
        run: npm ci || npm install

      - name: Typecheck Worker entry
        working-directory: api/cloudflare
        run: npx tsc --noEmit

      # wrangler가 ../Dockerfile 을 docker build 하므로 Docker 데몬 필요
      # ubuntu-latest 러너엔 기본 설치되어 있음.
      - name: Deploy
        working-directory: api/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
